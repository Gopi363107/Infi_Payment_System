spring.application.name=Infi_Payment_System

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/infi_payment_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Gopi@2005}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=ThisIsMyVerySecureSecretKeyForJwtAuthentication123456
jwt.expiration=86400000

logging.level.root=INFO
logging.level.org.edu.infi_payment_system=DEBUG

spring.data.redis.host = ${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port = ${SPRING_DATA_REDIS_PORT:6379}

# Kafka Broker
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Consumer
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest

# Consumer Deserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust Packages
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Producer Serializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
